services:
  postgres:
    image: postgres:16-alpine
    container_name: reelms-postgres
    environment:
      POSTGRES_USER: reelms
      POSTGRES_PASSWORD: reelms
      POSTGRES_DB: reelms
    ports:
      - "5432:5432"
    volumes:
      - reelms_postgres_data:/var/lib/postgresql/data
      - ../postgres:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: reelms-redis
    ports:
      - "6379:6379"

volumes:
  reelms_postgres_data:
