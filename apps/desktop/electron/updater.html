<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Reelms Updater</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            background:
                radial-gradient(circle at top, rgba(111, 120, 255, 0.28), transparent 38%),
                linear-gradient(145deg, #070914, #0d1020 60%, #080a12);
            color: white;
            font-family: Inter, Segoe UI, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }

        .card {
            width: 340px;
            padding: 28px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
            text-align: center;
        }

        .logo {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            margin: 0 auto 18px;
            background: linear-gradient(135deg, #7c83ff, #55e0ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -1px;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 8px;
        }

        p {
            color: rgba(255, 255, 255, 0.68);
            margin: 0 0 22px;
            font-size: 14px;
        }

        .spinner {
            width: 34px;
            height: 34px;
            margin: 0 auto 18px;
            border: 3px solid rgba(255, 255, 255, 0.14);
            border-top-color: #8b91ff;
            border-radius: 999px;
            animation: spin 0.9s linear infinite;
        }

        .bar {
            width: 100%;
            height: 8px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            overflow: hidden;
        }

        .fill {
            height: 100%;
            width: 0%;
            border-radius: 999px;
            background: linear-gradient(90deg, #7c83ff, #55e0ff);
            transition: width 0.25s ease;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">R</div>
        <h1>Reelms</h1>
        <div class="spinner"></div>
        <p id="status">Starting updater...</p>
        <div class="bar">
            <div class="fill" id="fill"></div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron')

        ipcRenderer.on('updater:status', (_, text) => {
            document.getElementById('status').textContent = text
        })

        ipcRenderer.on('updater:progress', (_, percent) => {
            document.getElementById('fill').style.width = `${percent}%`
        })
    </script>
</body>

</html>
