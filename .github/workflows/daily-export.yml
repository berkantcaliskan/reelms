name: Günlük Takip Raporu

on:
  schedule:
    - cron: '0 2 * * *'   # Her gün 02:00 UTC (05:00 Türkiye)
  workflow_dispatch:        # Elle de tetiklenebilir

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # commit + push için gerekli

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Bağımlılıkları yükle
        working-directory: scripts
        run: npm install

      - name: Excel raporunu oluştur
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/export-to-excel.mjs

      - name: Değişiklikleri commit et ve push'la
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/reelms-tracking.xlsx
          git diff --staged --quiet || git commit -m "chore: takip raporu $(date -u +'%Y-%m-%d')"
          git push
